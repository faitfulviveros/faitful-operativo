<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --v:#2D5A27;--vl:#4A7C3F;--vs:#EBF2E8;--vb:#C5DDB8;
  --n:#D4622A;--cr:#F7F3EE;--tx:#1C2419;--ts:#5A6B56;
  --wh:#FFFFFF;--br:#D8E4D0;
  --ad-bg:#E8F5E2;--ad-tx:#2D5A27;
  --ar-bg:#FAEEE6;--ar-tx:#9B3F15;
  --ep-bg:#EEF4FF;--ep-tx:#2040A0;
  --ng-bg:#FFF8E0;--ng-tx:#7A5800;
}
body{font-family:'DM Sans',sans-serif;background:var(--cr);color:var(--tx);min-height:100vh}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--cr)}
.login-box{background:var(--wh);border:1px solid var(--br);border-radius:16px;padding:2.5rem 2rem;width:340px;text-align:center}
.login-box h1{font-family:'DM Serif Display',serif;font-size:28px;color:var(--v);font-weight:400;margin-bottom:.3rem}
.login-box p{font-size:13px;color:var(--ts);margin-bottom:1.5rem}
.login-box input{width:100%;font-size:14px;font-family:'DM Sans',sans-serif;padding:10px 14px;border:1px solid var(--br);border-radius:8px;background:var(--cr);color:var(--tx);outline:none;text-align:center;letter-spacing:.1em;margin-bottom:1rem}
.login-box input:focus{border-color:var(--vb);background:var(--vs)}
.login-box button{width:100%;font-size:14px;font-family:'DM Sans',sans-serif;background:var(--v);color:#fff;border:none;border-radius:8px;padding:10px;cursor:pointer}
.login-box button:hover{background:var(--vl)}
.login-error{font-size:12px;color:var(--n);margin-top:.5rem;display:none}

/* APP */
#app-screen{display:none;max-width:980px;margin:0 auto;padding:1rem .75rem 4rem}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--vb);padding-bottom:.75rem;margin-bottom:1rem;gap:8px}
.hdr h1{font-family:'DM Serif Display',serif;font-size:22px;color:var(--v);font-weight:400;white-space:nowrap}
.hdr-right{display:flex;align-items:center;gap:6px;flex-wrap:nowrap}
.hdr-date{font-size:11px;color:var(--ts);white-space:nowrap}
.btn-back{font-size:12px;color:var(--v);background:none;border:1px solid var(--vb);border-radius:6px;padding:5px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
.btn-export{font-size:12px;color:var(--v);background:var(--vs);border:1px solid var(--vb);border-radius:6px;padding:5px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
.btn-logout{font-size:12px;color:var(--ts);background:none;border:1px solid var(--br);border-radius:6px;padding:5px 8px;cursor:pointer;font-family:'DM Sans',sans-serif}
@media(max-width:480px){.hdr-date{display:none}.hdr h1{font-size:18px}}

/* ALERTAS */
.alertas{background:#FFF8F0;border:1px solid #F5C49A;border-radius:10px;padding:.75rem 1rem;margin-bottom:1rem}
.alerta-title{font-size:12px;font-weight:500;color:var(--n);margin-bottom:.5rem}
.alerta-item{font-size:12px;color:var(--tx);padding:4px 0;display:flex;align-items:center;justify-content:space-between;gap:8px;border-bottom:1px solid #FDE5CC}
.alerta-item:last-child{border-bottom:none}
.alerta-item-nombre{flex:1;cursor:pointer;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.alerta-item-nombre:hover{color:var(--v)}
.alerta-dias{font-size:11px;font-weight:500;color:var(--n);background:#FAEEE6;padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0}

/* RESUMEN */
.resumen{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:1rem}
.rc{background:var(--wh);border:1px solid var(--br);border-radius:10px;padding:.6rem .75rem}
.rc-num{font-family:'DM Serif Display',serif;font-size:24px;color:var(--v)}
.rc-num.alerta{color:var(--n)}
.rc-lbl{font-size:10px;color:var(--ts);margin-top:1px}

/* BLOQUES DASHBOARD */
.bloque{margin-bottom:1.2rem}
.bloque-tit{font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--ts);margin-bottom:.5rem}

/* TEMA CARD — mobile first layout */
.tema-card{background:var(--wh);border:1px solid var(--br);border-radius:10px;padding:.75rem 1rem;margin-bottom:6px;cursor:pointer;transition:box-shadow .15s;display:block}
.tema-card:hover{box-shadow:0 2px 10px rgba(45,90,39,.08)}
.tema-card.vencido{border-left:3px solid var(--n)}
.tc-row1{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px}
.tc-nombre{font-size:14px;font-weight:500;color:var(--tx);flex:1;min-width:0}
.tc-row2{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tc-equipo{font-size:11px;color:var(--ts)}
.tc-freq{font-size:10px;color:var(--ts);background:var(--cr);border-radius:4px;padding:1px 5px}
.tc-pen{font-size:11px;color:var(--n);font-weight:500}
.tc-proxima{font-size:11px;color:var(--ts);margin-left:auto}
.tc-proxima.urgente{color:var(--n);font-weight:500}
.badge{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;white-space:nowrap;flex-shrink:0}
.badge.al-dia{background:var(--ad-bg);color:var(--ad-tx)}
.badge.a-revisar{background:var(--ar-bg);color:var(--ar-tx)}

/* DETALLE */
.det-meta{font-size:12px;color:var(--ts);margin-top:3px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.urgente{color:var(--n);font-weight:500}
.det-tabs{display:flex;gap:4px;margin:1rem 0;border-bottom:1px solid var(--br)}
.tab-btn{font-size:13px;font-family:'DM Sans',sans-serif;background:none;border:none;border-bottom:2px solid transparent;padding:6px 14px;cursor:pointer;color:var(--ts);margin-bottom:-1px}
.tab-btn.active{color:var(--v);border-bottom-color:var(--v);font-weight:500}
.tab-content{display:none}.tab-content.active{display:block}

/* SUBTEMAS */
.subtema-bloque{margin-bottom:1.1rem}
.sub-tit{font-size:12px;font-weight:500;color:var(--v);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem;display:flex;align-items:center;justify-content:space-between}

/* ACCION ROW — mobile card style */
.accion-row{background:var(--wh);border:1px solid var(--br);border-radius:8px;padding:.7rem .9rem;margin-bottom:6px;font-size:12px}
.ar-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:5px}
.ar-def{font-size:13px;font-weight:500;color:var(--tx);flex:1;min-width:0}
.ar-del{background:none;border:none;cursor:pointer;color:var(--br);font-size:16px;padding:0;flex-shrink:0;line-height:1}
.ar-del:hover{color:var(--n)}
.ar-acc{color:var(--ts);font-size:12px;margin-bottom:6px;line-height:1.4}
.ar-bottom{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ar-fecha{font-size:10px;color:var(--ts);background:var(--cr);padding:1px 6px;border-radius:4px}
.ar-cuando{font-size:10px;color:var(--ts)}
.ar-spacer{flex:1}
.quien-sel{font-size:11px;font-family:'DM Sans',sans-serif;padding:3px 6px;border-radius:6px;border:1px solid var(--br);background:var(--cr);color:var(--tx);cursor:pointer;outline:none;max-width:110px}
.status-sel{font-size:10px;font-weight:500;padding:3px 8px;border-radius:12px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;-webkit-appearance:none;appearance:none;outline:none}
.status-sel.pendiente{background:var(--ar-bg);color:var(--ar-tx)}
.status-sel.en-proceso,.status-sel.iniciado{background:var(--ep-bg);color:var(--ep-tx)}
.status-sel.evaluando,.status-sel.negociando{background:var(--ng-bg);color:var(--ng-tx)}
.status-sel.terminado{background:var(--ad-bg);color:var(--ad-tx)}
.status-sel.otro{background:var(--cr);color:var(--ts)}
.empty-sub{font-size:12px;color:var(--ts);font-style:italic;padding:.3rem 0}
.btn-add-sub{font-size:12px;color:var(--vl);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-add-sub:hover{text-decoration:underline}

/* FORM */
.form-nueva{background:var(--vs);border:1px solid var(--vb);border-radius:8px;padding:.75rem 1rem;margin-top:.4rem}
.form-nueva h4{font-size:12px;font-weight:500;color:var(--v);margin-bottom:.5rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px}
@media(max-width:500px){.form-grid{grid-template-columns:1fr}}
.form-grid input,.form-grid select{font-size:12px;font-family:'DM Sans',sans-serif;padding:7px 8px;border:1px solid var(--vb);border-radius:6px;background:var(--wh);color:var(--tx);outline:none;width:100%}
.form-grid .full{grid-column:1/-1}
.form-btns{display:flex;justify-content:flex-end;gap:8px}
.btn-sm-cancel{font-size:12px;font-family:'DM Sans',sans-serif;background:none;border:1px solid var(--br);border-radius:6px;padding:6px 14px;cursor:pointer;color:var(--ts)}
.btn-sm-save{font-size:12px;font-family:'DM Sans',sans-serif;background:var(--v);color:#fff;border:none;border-radius:6px;padding:6px 16px;cursor:pointer}

/* PENDIENTES */
.pen-tema-lbl{font-size:10px;color:var(--ts);margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-top:10px}
.pen-tema-lbl:first-child{margin-top:0}

/* OVERLAY / MODAL */
.overlay{position:fixed;inset:0;background:rgba(28,36,25,.45);display:flex;align-items:flex-end;justify-content:center;z-index:200}
@media(min-width:600px){.overlay{align-items:center}}
.modal{background:var(--wh);border-radius:14px 14px 0 0;padding:1.4rem;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
@media(min-width:600px){.modal{border-radius:14px;max-height:85vh}}
.modal h3{font-family:'DM Serif Display',serif;font-size:18px;color:var(--v);font-weight:400;margin-bottom:1rem}
.modal label{font-size:12px;color:var(--ts);display:block;margin-bottom:3px;margin-top:10px}
.modal input,.modal select{width:100%;font-size:14px;font-family:'DM Sans',sans-serif;padding:9px 10px;border:1px solid var(--br);border-radius:7px;background:var(--cr);color:var(--tx);outline:none}
.modal textarea{width:100%;font-size:12px;font-family:monospace;padding:10px;border:1px solid var(--br);border-radius:7px;background:var(--cr);color:var(--tx);outline:none;resize:none;height:220px;line-height:1.6}
.modal-btns{display:flex;justify-content:flex-end;gap:8px;margin-top:1rem}
.btn-cancel{font-size:13px;font-family:'DM Sans',sans-serif;background:none;border:1px solid var(--br);border-radius:7px;padding:8px 16px;cursor:pointer;color:var(--ts)}
.btn-confirm{font-size:13px;font-family:'DM Sans',sans-serif;background:var(--v);color:#fff;border:none;border-radius:7px;padding:8px 16px;cursor:pointer}
.btn-copy{font-size:13px;font-family:'DM Sans',sans-serif;background:var(--v);color:#fff;border:none;border-radius:7px;padding:8px 16px;cursor:pointer}
.btn-copy.copied{background:var(--vl)}

/* SYNC INDICATOR */
.sync{position:fixed;bottom:1rem;right:1rem;font-size:11px;color:var(--ts);background:var(--wh);border:1px solid var(--br);border-radius:20px;padding:4px 12px;opacity:0;transition:opacity .3s;z-index:100}
.sync.show{opacity:1}
</style>
</head>

function checkLogin() {
  const val = document.getElementById('pwd-input').value;
  if (val === APP_PASSWORD) {
    sessionStorage.setItem('faitful_auth', '1');
    document.getElementById('login-screen').style.display = 'none';

    initApp();
  } else {

  }
}

  sessionStorage.removeItem('faitful_auth');

// ============================================================
// SUPABASE — load/save
// ============================================================
async function loadFromSupabase() {
  try {
    const { data, error } = await db.from('operativo_state').select('*').eq('id', 1).single();
    if (error && error.code !== 'PGRST116') { console.error(error); return; }
    if (data && data.payload) {
      const d = data.payload;
      state.acciones = d.acciones || {};
      state.statusOverrides = d.statusOverrides || {};
      state.quienOverrides = d.quienOverrides || {};
      state.temasEstado = d.temasEstado || {};
      state.temasUltima = d.temasUltima || {};
      state.equipoExtra = d.equipoExtra || [];
    }
  } catch(e) { console.error('Supabase load error:', e); }
  // aplicar overrides a temas
  for (const b of state.bloques) for (const t of b.temas) {
    if (state.temasEstado[t.id]) t.estado = state.temasEstado[t.id];
    if (state.temasUltima[t.id]) t.ultima = state.temasUltima[t.id];
  }
}

async function saveToSupabase() {
  const temasEstado = {}, temasUltima = {};
  for (const b of state.bloques) for (const t of b.temas) {
    temasEstado[t.id] = t.estado;
    temasUltima[t.id] = t.ultima;
  }
  const payload = { acciones: state.acciones, statusOverrides: state.statusOverrides, quienOverrides: state.quienOverrides, temasEstado, temasUltima, equipoExtra: state.equipoExtra };
  try {
    await db.from('operativo_state').upsert({ id: 1, payload, updated_at: new Date().toISOString() });
  } catch(e) { console.error('Supabase save error:', e); }
}

function scheduleSave() {
  const indicator = document.getElementById('sync-indicator');
  if (indicator) { indicator.classList.add('show'); }
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    await saveToSupabase();
    if (indicator) { indicator.textContent = '✓ Guardado'; setTimeout(() => indicator.classList.remove('show'), 1500); }
  }, 800);
}

// ============================================================
// HELPERS
// ============================================================
function uid() { return 'u' + Date.now() + Math.random().toString(36).slice(2,5); }
function parsF(s) { if (!s || s === '—') return null; const p = s.split('/'); if (p.length < 3) return null; return new Date(+p[2], +p[1]-1, +p[0]); }
function diasDesde(s) { const f = parsF(s); if (!f) return 0; return Math.floor((HOY - f) / 86400000); }
function freqD(f) { return parseInt((f || '99').replace('C/', '')) || 99; }
function vencido(t) { return diasDesde(t.ultima) > freqD(t.freq); }
function proxRev(t) {
  const f = parsF(t.ultima); if (!f) return '—';
  const d = new Date(f); d.setDate(d.getDate() + freqD(t.freq));
  const diff = Math.floor((d - HOY) / 86400000);
  if (diff < 0) return `Hace ${Math.abs(diff)}d`;
  if (diff === 0) return 'Hoy';
  if (diff === 1) return 'Mañana';
  return `En ${diff}d (${d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'})})`;
}
function proxUrgente(t) { const f = parsF(t.ultima); if (!f) return true; const d = new Date(f); d.setDate(d.getDate() + freqD(t.freq)); return (d - HOY) / 86400000 < 3; }
function toInp(s) { if (!s || s === '—') return ''; const p = s.split('/'); if (p.length < 3) return ''; return `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`; }
function fromInp(s) { if (!s) return ''; const [y,m,d] = s.split('-'); return `${d}/${m}/${y}`; }
function getTema(id) { for (const b of state.bloques) for (const t of b.temas) if (t.id === id) return t; return null; }
function getEquipo() { return [...EQUIPO_BASE, ...state.equipoExtra]; }

function bClass(s) {
  const k = (s || '').toLowerCase().trim();
  if (k === 'pendiente') return 'pendiente';
  if (['en-proceso','en proceso','en proceo'].includes(k)) return 'en-proceso';
  if (k === 'iniciado') return 'iniciado';
  if (['evaluando','negociando','propuesta enviada a proveedor'].includes(k)) return 'evaluando';
  if (['terminado','resuelto','al día'].includes(k)) return 'terminado';
  return 'otro';
}

function getAcciones(temaId) {
  const t = getTema(temaId); if (!t) return {};
  const base = {};
  for (const [sub, rows] of Object.entries(t.subtemas)) {
    base[sub] = rows.map(r => ({...r, status: state.statusOverrides[r.id] || r.status, quien: state.quienOverrides[r.id] || r.quien || ''}));
  }
  const extra = state.acciones[temaId] || {};
  for (const [sub, rows] of Object.entries(extra)) {
    if (!base[sub]) base[sub] = [];
    const withOv = rows.map(r => ({...r, status: state.statusOverrides[r.id] || r.status, quien: state.quienOverrides[r.id] || r.quien || ''}));
    base[sub] = [...withOv, ...base[sub]];
  }
  return base;
}

function pendientesDeTema(id) {
  return Object.values(getAcciones(id)).flat().filter(r => ['pendiente','en-proceso','iniciado'].includes(bClass(r.status))).length;
}
function todosLosPendientes() {
  const res = [];
  for (const b of state.bloques) for (const t of b.temas)
    for (const [sub, rows] of Object.entries(getAcciones(t.id)))
      for (const r of rows)
        if (['pendiente','en-proceso','iniciado'].includes(bClass(r.status)))
          res.push({...r, _tema: t.nombre, _sub: sub, _temaId: t.id});
  return res;
}
function temasVencidos() {
  return state.bloques.flatMap(b => b.temas.filter(t => vencido(t))).sort((a,b) => diasDesde(b.ultima) - diasDesde(a.ultima));
}
function totTemas() { return state.bloques.reduce((a,b) => a + b.temas.length, 0); }
function totAlDia() { return state.bloques.reduce((a,b) => a + b.temas.filter(t => t.estado === 'al-dia').length, 0); }
function totVencidos() { return state.bloques.reduce((a,b) => a + b.temas.filter(t => vencido(t)).length, 0); }

      <span class="alerta-item-nombre" onclick="abrirTema('${t.id}')">${t.nombre}</span>
      <span class="alerta-dias">${diasDesde(t.ultima)}d sin revisar</span>

  return `<div class="alertas">
    <div class="alerta-title">⚠ ${venc.length} tema${venc.length > 1 ? 's' : ''} vencido${venc.length > 1 ? 's' : ''}</div>

          <span class="ar-spacer"></span>
          <select class="quien-sel" onchange="handleQuienChange('${r.id}',this.value)">${quienOptions(r.quien || '')}</select>
          <select id="sel-${r.id}" class="status-sel ${sc}" onchange="changeStatus('${r.id}',this.value)">${statusOptions(r.status)}</select>
        </div>
      </div>`;
    }
    if (formAbierto === sub) {
      h += `<div class="form-nueva"><h4>Nueva entrada — ${sub}</h4>
        <div class="form-grid">
          <div><input type="date" id="f-fecha" value="${toInp(HOY_STR)}"></div>
          <div><select id="f-status">
            <option value="pendiente">Pendiente</option><option value="en-proceso">En proceso</option>
            <option value="iniciado">Iniciado</option><option value="evaluando">Evaluando</option>
            <option value="negociando">Negociando</option><option value="terminado">Terminado</option>
          </select></div>
          <div class="full"><input type="text" id="f-def" placeholder="Definición / decisión"></div>
          <div class="full"><input type="text" id="f-acc" placeholder="Acción concreta"></div>
          <div><select id="f-quien">${quienOptions('')}</select></div>
          <div><input type="text" id="f-cuando" placeholder="Cuándo"></div>
        </div>
        <div class="form-btns">
          <button class="btn-sm-cancel" onclick="cerrarForm()">Cancelar</button>
          <button class="btn-sm-save" onclick="guardarAccion('${sub.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')">Guardar</button>
        </div></div>`;
    }
    h += `</div>`;
  }
  h += `</div>`;

  h += `<div class="tab-content ${tabActiva === 'pendientes' ? 'active' : ''}" id="tab-pen">`;
  if (pen.length === 0) h += `<div style="font-size:13px;color:var(--ts);font-style:italic;padding:.5rem 0">Sin pendientes activos</div>`;
  for (const r of pen) {
    h += `<div class="pen-tema-lbl">${r._sub}</div>
    <div class="accion-row" style="border-left:3px solid var(--n)">
      <div class="ar-top"><span class="ar-def">${r.definicion || '—'}</span></div>
      ${r.accion && r.accion !== '—' ? `<div class="ar-acc">${r.accion}</div>` : ''}
      <div class="ar-bottom">
        ${r.cuando && r.cuando !== '—' ? `<span class="ar-cuando">${r.cuando}</span>` : ''}
        <span class="ar-spacer"></span>
        <select class="quien-sel" onchange="handleQuienChange('${r.id}',this.value)">${quienOptions(r.quien || '')}</select>
        <select id="sel-${r.id}" class="status-sel ${bClass(r.status)}" onchange="changeStatus('${r.id}',this.value)">${statusOptions(r.status)}</select>
      </div>
    </div>`;
  }
  h += `</div>`;
  document.getElementById('main-content').innerHTML = h;
}

// ============================================================
// ACCIONES
// ============================================================
function changeStatus(rowId, newStatus) {
  state.statusOverrides[rowId] = newStatus;
  scheduleSave();
  const sel = document.getElementById('sel-' + rowId);
  if (sel) sel.className = 'status-sel ' + bClass(newStatus);
}

function handleQuienChange(rowId, val) {
  if (val === '__nuevo__') {
    const nombre = (prompt('Nombre:') || '').trim();
    if (!nombre) return;
    if (!state.equipoExtra.includes(nombre)) state.equipoExtra.push(nombre);
    state.quienOverrides[rowId] = nombre;
    scheduleSave(); render();
  } else {
    state.quienOverrides[rowId] = val;
    scheduleSave();
  }
}

function abrirTema(id) { temaActivo = id; vista = 'detalle'; tabActiva = 'subtemas'; formAbierto = null; render(); }
function volverDash() { vista = 'dashboard'; temaActivo = null; formAbierto = null; render(); }
function setTab(t) { tabActiva = t; formAbierto = null; render(); }
function abrirForm(sub) { formAbierto = sub; render(); setTimeout(() => { const e = document.getElementById('f-def'); if (e) e.focus(); }, 50); }
function cerrarForm() { formAbierto = null; render(); }

function guardarAccion(sub) {
  const def = (document.getElementById('f-def') || {}).value || '';
  if (!def.trim()) return;
  const fecha = fromInp((document.getElementById('f-fecha') || {}).value || '');
  const acc = (document.getElementById('f-acc') || {}).value || '';
  let quien = (document.getElementById('f-quien') || {}).value || '';
  if (quien === '__nuevo__') quien = '';
  const cuando = (document.getElementById('f-cuando') || {}).value || '';
  const status = (document.getElementById('f-status') || {}).value || 'pendiente';
  if (!state.acciones[temaActivo]) state.acciones[temaActivo] = {};
  if (!state.acciones[temaActivo][sub]) state.acciones[temaActivo][sub] = [];
  state.acciones[temaActivo][sub].unshift({ id: uid(), fecha, definicion: def, accion: acc, quien, cuando, status });
  scheduleSave(); formAbierto = null; render();
}

function eliminarAccion(sub, id) {
  if (state.acciones[temaActivo]?.[sub]) {
    state.acciones[temaActivo][sub] = state.acciones[temaActivo][sub].filter(r => r.id !== id);
    delete state.statusOverrides[id]; delete state.quienOverrides[id];
    scheduleSave(); render();
  }
}

function toggleEstado(temaId) {
  const t = getTema(temaId);
  t.estado = t.estado === 'al-dia' ? 'a-revisar' : 'al-dia';
  if (t.estado === 'al-dia') t.ultima = HOY_STR;
  scheduleSave(); render();
}

// ============================================================
// EXPORTAR AGENDA
// ============================================================
function abrirExport(temaId) {
  const texto = generarTexto(temaId);
  const ov = document.createElement('div'); ov.className = 'overlay';
  ov.innerHTML = `<div class="modal">
    <h3>${temaId ? getTema(temaId).nombre + ' — Pendientes' : 'Agenda completa'}</h3>
    <p style="font-size:12px;color:var(--ts);margin-bottom:.8rem">Listo para copiar y pegar en WhatsApp o mail</p>
    <textarea id="export-txt" readonly>${texto}</textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="cerrarModal()">Cerrar</button>
      <button class="btn-copy" id="copy-btn" onclick="copiarTexto()">Copiar</button>
    </div>
  </div>`;
  document.body.appendChild(ov); modalEl = ov;
}

function generarTexto(temaId) {
  const lineas = [];
  lineas.push(`📋 FAITFUL — Operativo ${HOY_STR}`);
  lineas.push('');
  if (temaId) {
    const t = getTema(temaId);
    lineas.push(`*${t.nombre.toUpperCase()}*`);
    lineas.push(`Próxima revisión: ${proxRev(t)}`);
    lineas.push('');
    for (const [sub, rows] of Object.entries(getAcciones(temaId))) {
      const activos = rows.filter(r => ['pendiente','en-proceso','iniciado'].includes(bClass(r.status)));
      if (activos.length === 0) continue;
      lineas.push(`_${sub}_`);
      for (const r of activos) {
        const quien = r.quien ? ` → ${r.quien}` : '';
        const cuando = r.cuando && r.cuando !== '—' ? ` (${r.cuando})` : '';
        lineas.push(`• ${r.definicion}${cuando}${quien}`);
      }
      lineas.push('');
    }
  } else {
    const venc = temasVencidos();
    if (venc.length > 0) {
      lineas.push(`⚠️ *VENCIDOS (${venc.length})*`);
      for (const t of venc) lineas.push(`• ${t.nombre} — ${diasDesde(t.ultima)}d sin revisar`);
      lineas.push('');
    }
    for (const b of state.bloques) {
      const pens = [];
      for (const t of b.temas) {
        const p = pendientesDeTema(t.id);
        if (p > 0) pens.push(`• ${t.nombre}: ${p} pendiente${p > 1 ? 's' : ''}`);
      }
      if (pens.length > 0) {
        lineas.push(`*${b.titulo.toUpperCase()}*`);
        pens.forEach(p => lineas.push(p));
        lineas.push('');
      }
    }
    lineas.push(`Total: ${todosLosPendientes().length} pendientes activos`);
  }
  return lineas.join('\n');
}

function copiarTexto() {
  const ta = document.getElementById('export-txt'); if (!ta) return;
  navigator.clipboard.writeText(ta.value).then(() => {
    const btn = document.getElementById('copy-btn');
    if (btn) { btn.textContent = '¡Copiado!'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 2000); }
  }).catch(() => { ta.select(); document.execCommand('copy'); });
}

function cerrarModal() { if (modalEl) { modalEl.remove(); modalEl = null; } }

// ============================================================
// INIT
// ============================================================
async function initApp() {
  document.getElementById('main-content').innerHTML = '<div style="text-align:center;padding:3rem;color:var(--ts)">Cargando datos...</div>';
  await loadFromSupabase();
  render();
}

// Auto-check session
if (sessionStorage.getItem('faitful_auth') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  initApp();
}
</script>
</body>
